spring.application.name=SpringAI-Demo

# =========================
# OpenRouter Configuration
# =========================
spring.ai.openai.api-key=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

